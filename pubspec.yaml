name: flutter_neo_shield
description: Client-side PII protection toolkit for Flutter — auto-scrubs sensitive data from logs, secures clipboard with timed auto-clear, protects sensitive strings in memory, and obfuscates string literals in compiled binaries.
version: 0.1.0
homepage: https://github.com/neelakandan/flutter_neo_shield
repository: https://github.com/neelakandan/flutter_neo_shield
issue_tracker: https://github.com/neelakandan/flutter_neo_shield/issues
topics:
  - security
  - privacy
  - pii
  - logging
  - obfuscation

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.9.0
  plugin_platform_interface: ^2.1.0
  source_gen: ^2.0.0
  build: ^2.4.0
  analyzer: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.0
  fake_async: ^1.3.0
  build_runner: ^2.4.0
  build_test: ^2.2.0

flutter:
  plugin:
    platforms:
      android:
        package: com.neelakandan.flutter_neo_shield
        pluginClass: FlutterNeoShieldPlugin
      ios:
        pluginClass: FlutterNeoShieldPlugin
