name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart analyze --fatal-infos

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart format --set-exit-if-changed .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test --coverage

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test --coverage
      - name: Check coverage threshold
        run: |
          if [ -f coverage/lcov.info ]; then
            LINES=$(grep -c "DA:" coverage/lcov.info || true)
            HITS=$(grep "DA:" coverage/lcov.info | grep -cv ",0$" || true)
            if [ "$LINES" -gt 0 ]; then
              PERCENT=$((HITS * 100 / LINES))
              echo "Coverage: $PERCENT%"
              if [ "$PERCENT" -lt 85 ]; then
                echo "Coverage $PERCENT% is below 85% threshold"
                exit 1
              fi
            fi
          fi

  pub-score:
    name: Pub Score
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart pub publish --dry-run
